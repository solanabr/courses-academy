# Teacher registry — maintainer-controlled, informational for now.
#
# `githubId` is the NUMERIC GitHub user id (stable across username changes),
# which is what `profiles.github_id` stores.
#
#   curl -s https://api.github.com/users/<login> | jq .id
#
# NOTHING READS THIS FILE YET. It is not enforced by content-lint, by the
